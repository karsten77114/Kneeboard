name = "jx-briefing"
main = "worker.js"
compatibility_date = "2024-01-01"

# Secrets (wrangler secret put):
#   LIDO_USER, LIDO_PASS   — LIDO 自動登入
#   GEMINI_API_KEY          — Gemini AI
#   UPLOAD_TOKEN            — iOS Shortcut 上傳憑證
# 注意：ELB 不需帳密，首頁 JSESSIONID cookie 即可驗證

[[kv_namespaces]]
binding = "NOTICES_KV"
id = "6430558b8a944c15949ad9d4a88944ab"
# 建立方式：wrangler kv namespace create NOTICES_KV
# 建立後把回傳的 id 填到上面這行
