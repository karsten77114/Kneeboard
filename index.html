<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kneeboard">
  <meta name="theme-color" content="#0f1824">
  <title>Kneeboard</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- Always-visible flight context bar -->
  <header id="topbar">
    <div id="topbar-row1"></div>
    <div id="topbar-row2"></div>
  </header>

  <!-- Always-visible flight search bar -->
  <div id="searchbar"></div>

  <!-- iPad landscape sidebar (hidden on mobile) -->
  <nav id="sidebar"></nav>

  <!-- Main scrollable content -->
  <main id="main"></main>

  <!-- Bottom tab bar (mobile / iPad portrait) -->
  <nav id="tabbar"></nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
