<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kneeboard">
  <meta name="theme-color" content="#0f1824">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Kneeboard</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="assets/vendor/leaflet/leaflet.css"/>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
</head>
<body>

  <!-- Always-visible flight context bar -->
  <header id="topbar">
    <div id="topbar-row1"></div>
    <div id="topbar-row2"></div>
  </header>

  <!-- Always-visible flight search bar -->
  <div id="searchbar"></div>

  <!-- iPad landscape sidebar (hidden on mobile) -->
  <nav id="sidebar"></nav>

  <!-- Main scrollable content -->
  <main id="main"></main>

  <!-- Bottom tab bar (mobile / iPad portrait) -->
  <nav id="tabbar"></nav>

  <script src="assets/vendor/leaflet/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
